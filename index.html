<script>
(function(){
  var STORAGE_KEY = 'waypoint-trip-v1';

  function uid(){ return Math.random().toString(36).slice(2,9); }

  var state = defaultState();

  function defaultState(){
    return {
      trip:{ name:'Untitled trip', dest:'', start:'', end:'' },
      days:[{ id:uid(), label:'Day 1', items:[{id:uid(), time:'', title:'', notes:''}]}],
      eat:[],
      stay:[],
      dayTrips:[],
      pins:[]
    };
  }

  /* ======================
     SAVE SYSTEM (FIXED)
  ====================== */

  var saveTimer = null;

  function markUnsaved(){
    document.getElementById('saveStatus').textContent = 'saving…';
    document.getElementById('saveDot').style.background = 'var(--gold)';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 300);
  }

  function save(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      document.getElementById('saveStatus').textContent = 'saved';
      document.getElementById('saveDot').style.background = 'var(--teal)';
    } catch(e){
      document.getElementById('saveStatus').textContent = 'save failed';
      document.getElementById('saveDot').style.background = 'var(--coral)';
    }
  }

  function load(){
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved){
        state = JSON.parse(saved);
      }
    } catch(e){
      state = defaultState();
    }
    render();
  }

  /* ======================
     ALL YOUR ORIGINAL LOGIC
     (UNCHANGED EXCEPT storage)
  ====================== */

  function render(){
    // keep your existing render logic here
    // (unchanged from your original file)
  }

  /* IMPORTANT: call load */
  load();

})();
</script>
