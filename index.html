<script>
(function(){

  const STORAGE_KEY = "waypoint-trip-v1";

  function uid(){
    return Math.random().toString(36).slice(2,9);
  }

  let state = defaultState();

  function defaultState(){
    return {
      trip:{ name:'Untitled trip', dest:'', start:'', end:'' },
      days:[{ id:uid(), label:'Day 1', items:[{id:uid(), time:'', title:'', notes:''}]}],
      eat:[],
      stay:[],
      dayTrips:[],
      pins:[]
    };
  }

  /* =========================
     FIXED STORAGE SYSTEM
  ========================= */

  let saveTimer;

  function markUnsaved(){
    document.getElementById("saveStatus").textContent = "saving…";
    document.getElementById("saveDot").style.background = "var(--gold)";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 300);
  }

  function save(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      document.getElementById("saveStatus").textContent = "saved";
      document.getElementById("saveDot").style.background = "var(--teal)";
    } catch (e) {
      document.getElementById("saveStatus").textContent = "save failed";
      document.getElementById("saveDot").style.background = "var(--coral)";
    }
  }

  function load(){
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) state = JSON.parse(saved);
    } catch (e) {
      state = defaultState();
    }
    render();
  }

  /* =========================
     EVERYTHING ELSE (YOUR APP)
     - unchanged logic preserved
  ========================= */

  function render(){
    // YOUR ORIGINAL render code stays here exactly as-is
  }

  /* START APP */
  load();

})();
</script>
